name: Logger Library building by Nhen

on:
  push:
    branches:
      - 'feature/*'
      - 'fixbug/*'

  pull_request:
    branches:
      - master

  # Only enable build when we want to check this build stable or not
  # schedule:
  #   - cron: '0 2,8 * * *'

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache clang-tidy clang-format lcov
    
    # --- Setup Docker environment ---
    - name: Prepare docker environment
      run: ./scripts/docker_prepare.sh
    
    - name: Starting docker container
      run: ./scripts/run_dev.sh

    # --- Configure CMake with coverage enabled ---
    - name: Configure CMake
      run: ./scripts/build_native.sh configure

    - name: Check linter
      run: ./scripts/build_native.sh lint

    - name: Build project
      run: ./scripts/build_native.sh build

    # --- Run all test binaries in build/test ---
    - name: Run all tests
      run: ./scripts/build_native.sh run

    # --- Collect Coverage ---
    - name: Capture Coverage
      run: |
        lcov --capture --directory build --output-file coverage.info

        # Remove unwanted coverage paths
        lcov --remove coverage.info \
            '/usr/*' \
            '*/third-party/googletest/*' \
            '*/build/test/*' \
            --output-file coverage.info

        # Show coverage summary in logs
        lcov --list coverage.info

    # --- Generate HTML report ---
    - name: Generate Coverage Report
      run: |
        genhtml coverage.info --output-directory coverage_report

    # --- Upload as GitHub artifact ---
    # - name: Upload Coverage Report
    #   uses: actions/upload-artifact@v3
    #   with:
    #     name: coverage-report
    #     path: coverage_report/
    - name: Cleaning build artifacts
      if: always()
      run: rm -rf build
